<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<style>

     * {
      color: black;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: rgb(218, 218, 218);
      font-family: Arial, sans-serif;
    }

    /*barra de navegação*/
    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;

      position: fixed;
      top: 0;

    .contato{
        margin-top: 150px;

    }

    .contato p{
        margin-top: 25px; 
        font-size: 15px;
        
    }
.formulario {
  
  max-width: 500px;
  margin: -250px 350px 30px auto;
  padding-bottom: 150px;
  

 
  border-radius: 10px;
}

.formulario input,
.formulario textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

.formulario button {
  width: 100%;
  padding: 12px;
  background: #2981d4;
  color: white;
  border: none;
  cursor: pointer;
}

.formulario button:hover {
  background: #1f6bb3;
}

.white{
  background-color: white;
  padding-top: 10px;
  padding-bottom: 10px;
  border-radius: 12px;


  margin-top: 140px;
  margin-left: 50px;
  margin-right: 50px
  

 


}

.whatsapp-btn {
  margin-left: 5px;
  margin-top: 150px;

 

  display: flex;
  align-items: center;
  gap: 10px;

  background-color: #25D366;
  color: white;

  padding: 10px 20px;
  border-radius: 8px;

  text-decoration: none;
  width: fit-content;
}

.whatsapp-btn img {
  width: 24px;
}

.whatsapp-btn:hover {
  background-color: #1ebe5d;
}

#status {
  margin-top: 5px;
  text-align: center;;
  font-weight: bold;
  
}

.btn-dark {
  position: fixed;
  top: 15px;
  right: 20px;

  font-size: 22px;
  padding: 12px;

  background-color: black;
  color: white;

  border: none;
  border-radius: 50%;
  cursor: pointer;

  box-shadow: 0 4px 10px rgba(0,0,0,0.2);

  transition: 0.3s;
}

.btn-dark:hover {
  transform: scale(1.1);
}

.dark {
   color: white;
      background-color: #24284b;
  
}

.dark nav ul {
  background-color: #0d1668;
}

.dark .btn-dark {
  background-color: rgb(98, 163, 216);
  color: black;
  
  background-color: #1e1e1e;
}
  
.dark .contorno {
  background-color: #254f85;
}

.dark .contorno h1 {
  color: white;
}


.dark .perfil-container h2 {
  color: white;
}
</style>



<body>

  <link rel="stylesheet" href="style.css">
     <nav>
    <ul>
      <li><a href="main.html">Sobre Mim</a></li>
      <li><a href="portifolio.html">Portifólio</a></li>
      <li><a href="formacao.html">Formação</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>

     
  </nav>
  

  <div class = "white">
      <button onclick="toggleDark()" class="btn-dark">🌙</button>
  

    <div class="contato">
      
        <h1>Contato</h1>
        <p>Vamos conversar. Fale-me suas ideias!</p>
      
         <div class="whatsapp">
      
      <a href="https://wa.me/5541987351909" target="_blank" class="whatsapp-btn">
  <img src="https://cdn-icons-png.flaticon.com/512/220/220236.png" alt="WhatsApp">
  Fale comigo
</a>
    </div>
</h2>
    </div>
    

    <form id="formulario" class="formulario" novalidate>

      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="mensagem">Mensagem:</label>
      <textarea id="mensagem" name="mensagem" required></textarea>

        <button type="submit">Enviar</button>
        
    </form>

   
<p id="status"></p>

   
    </div>

     <script>
document.getElementById("formulario").addEventListener("submit", function(e) {
  e.preventDefault();

  let nome = document.getElementById("nome").value.trim();
  let email = document.getElementById("email").value.trim();
  let mensagem = document.getElementById("mensagem").value.trim();
  let status = document.getElementById("status");

  // validação
  if (nome === "" || email === "" || mensagem === "") {
    status.style.color = "red";
    status.textContent = "Preencha todos os campos!";
    return;
  }

  // valida email simples
  if (!email.includes("@")) {
    status.style.color = "red";
    status.textContent = "Email inválido!";
    return;
  }

  // simulação de envio
  status.style.color = "green";
  status.textContent = "Mensagem enviada com sucesso!";

  // limpa o formulário
  document.getElementById("formulario").reset();
});

function toggleDark() {
  document.body.classList.toggle("dark");

  const btn = document.querySelector(".btn-dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("tema", "dark");
    btn.textContent = "☀️";
  } else {
    localStorage.setItem("tema", "light");
    btn.textContent = "🌙";
  }
}

// ao carregar a página
window.onload = () => {
  const temaSalvo = localStorage.getItem("tema");

  if (temaSalvo === "dark") {
    document.body.classList.add("dark");
    document.querySelector(".btn-dark").textContent = "☀️";
  }
};
</script>


    
</body>
</html>
